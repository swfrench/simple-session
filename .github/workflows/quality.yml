name: code quality
on: [push]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25.x'
      - name: vet
        run: go vet ./...
      - name: staticcheck
        uses: dominikh/staticcheck-action@v1.4.1
        with:
          install-go: false
          version: "2026.1"
      - name: test
        run: go test -v -cover ./...
